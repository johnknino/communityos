<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Digital Equity Dashboard — CommUnity OS</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#12201E">
<meta name="description" content="Digital divide assessment by zip code. Broadband access, device ownership, and age-based digital barriers for libraries and broadband offices.">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300..800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
<div class="page">
  <div class="ds-hero">
    <h1>Digital Equity Dashboard</h1>
    <p>For libraries, ISPs, broadband offices, digital literacy nonprofits. The digital divide by zip code.</p>
    <div class="ds-search">
      <input type="text" class="ds-zip" id="dsZip" maxlength="5" inputmode="numeric" placeholder="ZIP" onkeydown="if(event.key==='Enter')runDashboard()">
      <button class="ds-go" onclick="runDashboard()">Generate Brief</button>
    </div>
  </div>
  <div id="dsLoading" class="ds-loading" style="display:none">Querying federal data sources...</div>
  <div id="dsResults" style="display:none"></div>
</div>
<script src="/js/shared.js"></script>
<script src="/js/civic-intelligence.js"></script>
<script src="/js/dashboard-engine.js"></script>
<script>
var DE = DashEngine;

var CENSUS_VARS = ['B01003_001E','B19013_001E','B17001_002E','B17001_001E','B11001_001E','B03003_003E','B25064_001E','B28002_001E','B28002_002E','B28002_004E','B28002_007E','B28002_012E','B28002_013E','B28003_001E','B28003_002E','B28003_003E','B28003_004E','B01001_020E','B01001_021E','B01001_022E','B01001_023E','B01001_024E','B01001_025E','B01001_044E','B01001_045E','B01001_046E','B01001_047E','B01001_048E','B01001_049E'];

function runDashboard() {
  var zip = document.getElementById('dsZip').value.trim();
  if (!zip || zip.length !== 5) { alert('Enter a 5-digit zip code.'); return; }
  document.getElementById('dsLoading').style.display = '';
  document.getElementById('dsResults').style.display = 'none';
  Promise.allSettled([
    DE.queryCensus(zip, CENSUS_VARS),
    DE.queryGeo(zip)
  ]).then(function(r) {
    var census=r[0].value||{},geo=r[1].value||{};
    document.getElementById('dsLoading').style.display='none';
    render(zip,census,geo);
  });
}

function render(zip,c,geo) {
  var h = DE.renderProfile(zip,c,geo);
  var signals=[];
  var pop=c.B01003_001E||0, hh=c.B11001_001E||0;
  var intTot=c.B28002_001E||0;
  var broadband=c.B28002_002E||0;
  var cellOnly=c.B28002_007E||0;
  var noSub=c.B28002_012E||0;
  var noInt=c.B28002_013E||0;
  var compTot=c.B28003_001E||0, hasComp=c.B28003_002E||0, noComp=c.B28003_002E?(compTot-hasComp):0;
  var hasSmart=c.B28003_003E||0, hasTab=c.B28003_004E||0;
  var noIntPct=DE.pct(noInt,intTot);
  var cellOnlyPct=DE.pct(cellOnly,intTot);
  var noCompPct=DE.pct(noComp,compTot);
  var broadPct=DE.pct(broadband,intTot);
  var senior=(c.B01001_020E||0)+(c.B01001_021E||0)+(c.B01001_022E||0)+(c.B01001_023E||0)+(c.B01001_024E||0)+(c.B01001_025E||0)+(c.B01001_044E||0)+(c.B01001_045E||0)+(c.B01001_046E||0)+(c.B01001_047E||0)+(c.B01001_048E||0)+(c.B01001_049E||0);
  var seniorPct=DE.pct(senior,pop);

  h += DE.sectionOpen('💻','Digital Access Profile');
  h += '<div class="ds-grid">';
  h += DE.statCard(broadPct+'%','Have Broadband',broadPct<70?'highlight':broadPct>90?'good':'');
  h += DE.statCard(noIntPct+'%','No Internet',noIntPct>15?'highlight':'');
  h += DE.statCard(cellOnlyPct+'%','Phone Only',cellOnlyPct>20?'highlight':'');
  h += DE.statCard(noCompPct+'%','No Computer',noCompPct>15?'highlight':'');
  h += DE.statCard(seniorPct+'%','Age 65+');
  h += DE.statCard(DE.fmt(noInt),'Disconnected HH');
  h += '</div>';

  if (noIntPct>20){signals.push({w:3});h+=DE.signalRow('🔴',noIntPct+'% of households have no internet — '+DE.fmt(noInt)+' disconnected households')}
  if (cellOnlyPct>25){signals.push({w:2});h+=DE.signalRow('🔴',cellOnlyPct+'% are smartphone-only — can browse but cannot fill complex government forms')}
  if (noCompPct>15){signals.push({w:2});h+=DE.signalRow('🔴',noCompPct+'% have no computer — device distribution needed')}
  if (seniorPct>20&&noIntPct>10){signals.push({w:1});h+=DE.signalRow('🟡',seniorPct+'% seniors + '+noIntPct+'% offline — telehealth and benefits access barrier')}
  h += DE.sectionClose();

  var need=DE.calcNeedScore(signals);
  h += DE.briefOpen('Digital Equity Brief');
  h += '<p><strong>Gap level: '+need.level+'.</strong></p>';
  if (noIntPct>15) h+='<p>🌐 <strong>Connectivity:</strong> '+DE.fmt(noInt)+' households offline. Fixed broadband deployment or community wifi needed.</p>';
  if (cellOnlyPct>20) h+='<p>📱 <strong>Smartphone-only:</strong> '+cellOnlyPct+'% phone-only. CommUnity OS is designed for this — all tools work on phones. But SNAP applications, FAFSA, and job applications require full browsers.</p>';
  if (noCompPct>15) h+='<p>🖥️ <strong>Device gap:</strong> '+noCompPct+'% without computers. Library computer access, refurbished device programs, school device loans.</p>';
  h+='<p>📍 <strong>CommUnity OS:</strong> All 18 tools work on phones, offline where possible, and are designed for low-bandwidth connections. Deploy at libraries and community centers.</p>';
  h += DE.briefClose();

  h += DE.actionLinks([
    {href:'/neighborhood.html?zip='+zip,label:'Full neighborhood profile →',primary:true},
    {href:'/benefits-screener.html',label:'Benefit screener (works on phone) →'},
    {href:'/disaster.html',label:'Offline emergency prep →'}
  ]);
  h += (typeof CivicIntel!=='undefined' ? CivicIntel.deidentNotice() : '') + DE.sourceNote('Sources: Census ACS 2022 (B28002 internet, B28003 computer). Zero data collected.');
  document.getElementById('dsResults').innerHTML=h;
  document.getElementById('dsResults').style.display='';
  document.getElementById('dsResults').scrollIntoView({behavior:'smooth',block:'start'});
}

DE.autoLoad('dsZip', runDashboard);
EQ.init({});
</script>
</body>
</html>
