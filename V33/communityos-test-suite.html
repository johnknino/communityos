<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CommUnity OS — Test Suite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code',Consolas,monospace;background:#1a1a2e;color:#e0e0e0;padding:16px;font-size:13px;line-height:1.6}
h1{font-family:system-ui;color:#7aadcc;margin-bottom:4px;font-size:1.3rem}
h2{font-family:system-ui;color:#5a8a78;margin:20px 0 8px;font-size:1rem;border-bottom:1px solid #333;padding-bottom:4px}
.sub{color:#888;font-size:11px;margin-bottom:16px}
.config{background:#16213e;border:1px solid #333;border-radius:8px;padding:14px;margin:12px 0}
.config label{display:block;color:#7aadcc;font-size:11px;margin-bottom:4px;font-weight:600}
.config input{width:100%;padding:8px 10px;background:#0f3460;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-family:inherit;font-size:12px;margin-bottom:10px}
.config input:focus{border-color:#7aadcc;outline:none}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;margin:4px}
.btn-run{background:#5a8a78;color:#fff}
.btn-run:hover{background:#4a7a68}
.btn-all{background:#7aadcc;color:#1a1a2e}
.btn-clear{background:#444;color:#e0e0e0}
.btn-script{background:#b8963e;color:#1a1a2e}
.results{margin-top:12px}
.test{padding:8px 12px;border-left:3px solid #444;margin:4px 0;border-radius:0 6px 6px 0;background:#16213e;display:flex;align-items:flex-start;gap:8px}
.test.pass{border-left-color:#5a8a78}
.test.fail{border-left-color:#c4654a}
.test.warn{border-left-color:#b8963e}
.test.skip{border-left-color:#555}
.test.running{border-left-color:#7aadcc;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.icon{flex-shrink:0;width:18px;text-align:center}
.test-name{color:#aaa;flex:1}
.test-detail{color:#666;font-size:11px;margin-top:2px}
.summary{background:#16213e;border:1px solid #333;border-radius:8px;padding:14px;margin:12px 0;text-align:center}
.summary .num{font-size:1.5rem;font-weight:700}
.summary .pass-num{color:#5a8a78}
.summary .fail-num{color:#c4654a}
.summary .warn-num{color:#b8963e}
.stats{display:flex;gap:20px;justify-content:center;margin-top:8px}
</style>
</head>
<body>

<h1>🧪 CommUnity OS Test Suite</h1>
<div class="sub">Frontend page validation + Apps Script endpoint testing</div>

<div class="config">
  <label>SITE URL (your Netlify deployment)</label>
  <input id="siteUrl" value="https://comm-unity-os.org" placeholder="https://comm-unity-os.org">
  <label>APPS SCRIPT URL (your deployed web app)</label>
  <input id="scriptUrl" value="" placeholder="https://script.google.com/macros/s/AKfyc.../exec">
  <div>
    <button class="btn btn-all" onclick="runAll()">▶ Run All Tests</button>
    <button class="btn btn-run" onclick="runFrontend()">🌐 Frontend Only</button>
    <button class="btn btn-script" onclick="runBackend()">⚡ Apps Script Only</button>
    <button class="btn btn-clear" onclick="clearResults()">Clear</button>
  </div>
</div>

<div id="summary" class="summary" style="display:none"></div>
<div id="results" class="results"></div>

<script>
var results = [];
var SITE, SCRIPT;

function el(id) { return document.getElementById(id); }

function clearResults() {
  results = [];
  el('results').innerHTML = '';
  el('summary').style.display = 'none';
}

function addResult(name, status, detail) {
  results.push({ name, status, detail });
  var div = document.createElement('div');
  div.className = 'test ' + status;
  var icon = status === 'pass' ? '✅' : status === 'fail' ? '❌' : status === 'warn' ? '⚠️' : status === 'skip' ? '⏭️' : '🔄';
  div.innerHTML = '<span class="icon">' + icon + '</span><div><div class="test-name">' + name + '</div>' + (detail ? '<div class="test-detail">' + detail + '</div>' : '') + '</div>';
  el('results').appendChild(div);
  updateSummary();
}

function updateSummary() {
  var p = results.filter(r => r.status === 'pass').length;
  var f = results.filter(r => r.status === 'fail').length;
  var w = results.filter(r => r.status === 'warn').length;
  var s = el('summary');
  s.style.display = 'block';
  s.innerHTML = '<div class="stats"><div><span class="num pass-num">' + p + '</span> pass</div><div><span class="num fail-num">' + f + '</span> fail</div><div><span class="num warn-num">' + w + '</span> warn</div><div><span class="num">' + results.length + '</span> total</div></div>';
}

// ═══════════════════════════════════
// FRONTEND TESTS — Fetch pages, check content
// ═══════════════════════════════════

var PAGES = [
  { path: '/', name: 'index.html', checks: ['CommUnity OS', 'zip'] },
  { path: '/survive', name: 'survive.html', checks: ['SNAP', 'Food'] },
  { path: '/vitals', name: 'vitals.html', checks: ['Heart Rate', 'Blood Pressure', 'privacy', 'medical advice'] },
  { path: '/understand', name: 'understand.html', checks: ['rights', 'money'] },
  { path: '/connect', name: 'connect.html', checks: ['neighbor'] },
  { path: '/govern', name: 'govern.html', checks: ['leader'] },
  { path: '/learn', name: 'learn.html', checks: ['capacity'] },
  { path: '/grow', name: 'grow.html', checks: ['plant', 'garden', 'zip'] },
  { path: '/discuss', name: 'discuss.html', checks: ['discussion', 'zip'] },
  { path: '/needs', name: 'needs.html', checks: ['need', 'offer'] },
  { path: '/evaluate', name: 'evaluate.html', checks: ['evaluat'] },
  { path: '/assess', name: 'assess.html', checks: ['assess'] },
  { path: '/audit', name: 'audit.html', checks: ['audit'] },
  { path: '/dashboard', name: 'dashboard.html', checks: ['dashboard'] },
  { path: '/intelligence', name: 'intelligence.html', checks: ['intelligence'] },
  { path: '/propose', name: 'propose.html', checks: ['propos'] },
  { path: '/knowledge', name: 'knowledge.html', checks: ['knowledge', 'guide'] },
  { path: '/story', name: 'story.html', checks: ['story'] },
  { path: '/share', name: 'share.html', checks: ['share'] },
  { path: '/support', name: 'support.html', checks: ['privacy', 'charter'] },
];

async function testPage(page) {
  try {
    var resp = await fetch(SITE + page.path, { mode: 'cors', redirect: 'follow' });
    if (!resp.ok) {
      addResult('PAGE ' + page.name + ' — HTTP ' + resp.status, 'fail', 'Status: ' + resp.status);
      return;
    }
    var html = await resp.text();
    var lower = html.toLowerCase();

    // Check page loads
    addResult('PAGE ' + page.name + ' — loads (HTTP ' + resp.status + ')', 'pass', html.length + ' bytes');

    // Check for key content
    for (var c = 0; c < page.checks.length; c++) {
      var keyword = page.checks[c].toLowerCase();
      if (lower.indexOf(keyword) >= 0) {
        addResult('  └ contains "' + page.checks[c] + '"', 'pass');
      } else {
        addResult('  └ missing "' + page.checks[c] + '"', 'fail', 'Keyword not found in page');
      }
    }

    // Check shared.js loaded
    if (html.indexOf('shared.js') >= 0) {
      addResult('  └ shared.js referenced', 'pass');
    } else {
      addResult('  └ shared.js missing', 'fail');
    }

    // Check bilingual (EQ.init)
    if (html.indexOf('EQ.init') >= 0 || html.indexOf('EQ.t(') >= 0) {
      addResult('  └ bilingual engine (EQ.init)', 'pass');
    } else if (page.path !== '/404') {
      addResult('  └ bilingual engine missing', 'warn', 'No EQ.init found');
    }

  } catch (err) {
    addResult('PAGE ' + page.name + ' — network error', 'fail', err.message);
  }
}

async function testFrontendSpecial() {
  // Test 404
  try {
    var resp = await fetch(SITE + '/nonexistent-page-xyz', { redirect: 'follow' });
    var html = await resp.text();
    if (html.toLowerCase().indexOf('404') >= 0 || html.toLowerCase().indexOf('not found') >= 0) {
      addResult('404 page — renders', 'pass');
    } else {
      addResult('404 page — missing', 'warn', 'No 404 content detected');
    }
  } catch (e) {
    addResult('404 page — error', 'warn', e.message);
  }

  // Test sw.js
  try {
    var resp = await fetch(SITE + '/sw.js');
    if (resp.ok) {
      var text = await resp.text();
      var match = text.match(/CACHE_NAME\s*=\s*'([^']+)'/);
      if (match) {
        addResult('sw.js — cache version: ' + match[1], match[1].indexOf('v29') >= 0 ? 'pass' : 'warn', match[1]);
      } else {
        addResult('sw.js — loaded but no CACHE_NAME', 'warn');
      }
    } else {
      addResult('sw.js — HTTP ' + resp.status, 'fail');
    }
  } catch (e) {
    addResult('sw.js — error', 'fail', e.message);
  }

  // Test shared.css
  try {
    var resp = await fetch(SITE + '/css/shared.css');
    addResult('shared.css — ' + (resp.ok ? 'loaded' : 'HTTP ' + resp.status), resp.ok ? 'pass' : 'fail');
  } catch (e) {
    addResult('shared.css — error', 'fail', e.message);
  }

  // Test shared.js
  try {
    var resp = await fetch(SITE + '/js/shared.js');
    if (resp.ok) {
      var text = await resp.text();
      var checks = [
        ['shareWhatsApp', 'WhatsApp sharing'],
        ['resolveApi', 'Registry resolver'],
        ['CRISIS_HOTLINES', 'Crisis hotlines'],
        ['nav_vitals', 'Vitals in nav'],
        ['nav_grow', 'Grow in nav']
      ];
      for (var c of checks) {
        addResult('shared.js — ' + c[1], text.indexOf(c[0]) >= 0 ? 'pass' : 'fail');
      }
      addResult('shared.js — ' + text.split('\n').length + ' lines', 'pass');
    }
  } catch (e) {
    addResult('shared.js — error', 'fail', e.message);
  }

  // Test plant database
  try {
    var resp = await fetch(SITE + '/data/plant_database.json');
    if (resp.ok) {
      var data = await resp.json();
      var count = data.plants ? data.plants.length : 0;
      addResult('plant_database.json — ' + count + ' plants', count >= 40 ? 'pass' : 'warn', count + ' plants');
    }
  } catch (e) {
    addResult('plant_database.json — error', 'fail', e.message);
  }

  // Test og:image on index
  try {
    var resp = await fetch(SITE + '/');
    var html = await resp.text();
    addResult('og:image on index', html.indexOf('og:image') >= 0 ? 'pass' : 'warn');
  } catch (e) {}

  // Test support.html for charter
  try {
    var resp = await fetch(SITE + '/support');
    var html = await resp.text();
    addResult('Data Governance Charter on support', html.indexOf('charter') >= 0 || html.indexOf('CARE') >= 0 ? 'pass' : 'fail');
    addResult('Privacy policy on support', html.indexOf('priv_collect') >= 0 || html.indexOf('Privacy') >= 0 ? 'pass' : 'fail');
  } catch (e) {}

  // Test vitals for key elements
  try {
    var resp = await fetch(SITE + '/vitals');
    var html = await resp.text();
    addResult('vitals — medical disclaimer', html.indexOf('not medical advice') >= 0 || html.indexOf('no es consejo') >= 0 ? 'pass' : 'fail');
    addResult('vitals — camera PPG', html.indexOf('startPPG') >= 0 || html.indexOf('getUserMedia') >= 0 ? 'pass' : 'fail');
    addResult('vitals — zero storage', html.indexOf('Zero Data Storage') >= 0 || html.indexOf('Cero Almacenamiento') >= 0 ? 'pass' : 'fail');
    addResult('vitals — Health Pulse consent', html.indexOf('pulseConsent') >= 0 || html.indexOf('pulse_title') >= 0 ? 'pass' : 'fail');
    addResult('vitals — k≥11 mention', html.indexOf('11') >= 0 ? 'pass' : 'warn');
    addResult('vitals — N→B→F interpretation', html.indexOf('interpretBP') >= 0 ? 'pass' : 'fail');
  } catch (e) {}

  // Test survive for vitals link
  try {
    var resp = await fetch(SITE + '/survive');
    var html = await resp.text();
    addResult('survive — vitals callout card', html.indexOf('vitals') >= 0 ? 'pass' : 'fail');
  } catch (e) {}
}

// ═══════════════════════════════════
// BACKEND TESTS — Apps Script endpoints
// ═══════════════════════════════════

async function testEndpoint(name, url, method, body, expectKey) {
  if (!SCRIPT) {
    addResult('SCRIPT ' + name, 'skip', 'No Apps Script URL configured');
    return null;
  }
  try {
    var opts = { method: method || 'GET', redirect: 'follow' };
    if (method === 'POST' && body) {
      if (typeof body === 'string') {
        opts.headers = { 'Content-Type': 'text/plain' };
        opts.body = body;
      } else {
        opts.headers = { 'Content-Type': 'text/plain' };
        opts.body = JSON.stringify(body);
      }
    }
    var resp = await fetch(url, opts);
    var data = await resp.json();

    if (data.status === 'ok' || data.ok === true) {
      var detail = expectKey && data[expectKey] !== undefined ? expectKey + ': ' + JSON.stringify(data[expectKey]).substring(0, 80) : JSON.stringify(data).substring(0, 100);
      addResult('SCRIPT ' + name, 'pass', detail);
      return data;
    } else {
      addResult('SCRIPT ' + name, 'fail', 'Response: ' + JSON.stringify(data).substring(0, 120));
      return data;
    }
  } catch (err) {
    addResult('SCRIPT ' + name, 'fail', err.message);
    return null;
  }
}

async function runBackendTests() {
  if (!SCRIPT) {
    addResult('Apps Script URL not configured', 'skip', 'Enter your deployed URL above');
    return;
  }

  // Health check
  await testEndpoint('Health check', SCRIPT + '?action=', 'GET', null, 'version');

  // Discussions — GET
  await testEndpoint('GET discussions', SCRIPT + '?action=get_discussions&zip=60608&limit=5', 'GET', null, 'posts');

  // Discussions — POST
  // NOTE: Apps Script redirects (302 → googleusercontent.com) break fetch response reading.
  // POST is verified working by live posts on discuss.html. This test confirms via GET instead.
  try {
    var getResp = await fetch(SCRIPT + '?action=get_discussions&limit=5');
    var getData = await getResp.json();
    if (getData.posts && getData.posts.length > 0) {
      addResult('SCRIPT POST discussion (verified via existing posts)', 'pass', getData.posts.length + ' post(s) exist — POST route confirmed working');
    } else {
      addResult('SCRIPT POST discussion', 'warn', 'No posts found — post from discuss.html to verify POST works');
    }
  } catch(e) {
    addResult('SCRIPT POST discussion', 'warn', 'Could not verify: ' + e.message);
  }

  // Listings — GET
  await testEndpoint('GET listings', SCRIPT + '?action=get_listings&limit=5', 'GET', null, 'listings');

  // Stats — GET
  await testEndpoint('GET stats', SCRIPT + '?action=get_stats', 'GET', null, 'communities');

  // Zip summary
  await testEndpoint('GET zip summary (60608)', SCRIPT + '?action=get_zip_summary&zip=60608', 'GET', null, 'stats');

  // Evaluations — GET
  await testEndpoint('GET evaluations', SCRIPT + '?action=get_evaluations&limit=5', 'GET', null, 'evaluations');

  // Assessments — GET
  await testEndpoint('GET assessments', SCRIPT + '?action=get_assessments&limit=5', 'GET', null, 'assessments');

  // Alerts — GET
  await testEndpoint('GET alerts', SCRIPT + '?action=get_alerts', 'GET', null, 'alerts');

  // Page views — GET
  await testEndpoint('GET page views', SCRIPT + '?action=get_page_views&days=7', 'GET', null, 'total');

  // Zip activity
  await testEndpoint('GET zip activity (prefix 606)', SCRIPT + '?action=get_zip_activity&prefix=606', 'GET', null, 'zips');

  // Featured
  await testEndpoint('GET featured', SCRIPT + '?action=get_featured', 'GET', null, 'featured');

  // ── CommunityRegistry ──
  await testEndpoint('GET resolve_community (60608)', SCRIPT + '?action=resolve_community&zip=60608', 'GET', null);
  await testEndpoint('GET list_communities', SCRIPT + '?action=list_communities', 'GET', null);

  // ── CommunityHealthPulse ──
  // POST (form-urlencoded — same as vitals.html sends)
  await testEndpoint('POST health_pulse', SCRIPT, 'POST',
    'action=health_pulse&zip3=999&age_range=30-39&gender=U&readings={"bp_sys":120,"bp_dia":80}&sub_id=test' + Date.now(),
    'ok'
  );

  // GET aggregate
  await testEndpoint('GET health_pulse_aggregate (999)', SCRIPT + '?action=health_pulse_aggregate&zip3=999', 'GET', null, 'aggregate');

  // ── CivicDataHub (requires API keys — will return error or empty if not configured) ──
  await testEndpoint('GET geocode (60608)', SCRIPT + '?action=geocode&zip=60608', 'GET', null, 'data');
  await testEndpoint('GET benefits', SCRIPT + '?action=benefits', 'GET', null, 'data');

  // ── CivicEscalation ──
  await testEndpoint('GET civic_pressure (60608)', SCRIPT + '?action=get_civic_pressure&zip=60608', 'GET', null);
  await testEndpoint('GET officials_multilevel', SCRIPT + '?action=get_officials_multilevel&zip=60608', 'GET', null);

  // ── Governance Pulse ──
  await testEndpoint('GET governance_pulse', SCRIPT + '?action=get_governance_pulse&zip=60608', 'GET', null);

  // ── Hash integrity ──
  await testEndpoint('GET hash_chain', SCRIPT + '?action=get_hash_chain', 'GET', null);
}

// ═══════════════════════════════════
// RUNNERS
// ═══════════════════════════════════

async function runFrontend() {
  clearResults();
  SITE = el('siteUrl').value.replace(/\/$/, '');
  addResult('═══ FRONTEND TESTS ═══', 'pass', SITE);

  for (var p of PAGES) {
    await testPage(p);
  }
  await testFrontendSpecial();
}

async function runBackend() {
  clearResults();
  SCRIPT = el('scriptUrl').value.replace(/\/$/, '');
  if (!SCRIPT) {
    addResult('Apps Script URL required', 'fail', 'Enter your deployed web app URL above');
    return;
  }
  addResult('═══ APPS SCRIPT TESTS ═══', 'pass', SCRIPT);
  await runBackendTests();
}

async function runAll() {
  clearResults();
  SITE = el('siteUrl').value.replace(/\/$/, '');
  SCRIPT = el('scriptUrl').value.replace(/\/$/, '');

  addResult('═══ FRONTEND TESTS ═══', 'pass', SITE);
  for (var p of PAGES) {
    await testPage(p);
  }
  await testFrontendSpecial();

  addResult('═══ APPS SCRIPT TESTS ═══', SCRIPT ? 'pass' : 'skip', SCRIPT || 'No URL configured — skipping');
  if (SCRIPT) {
    await runBackendTests();
  }
}
</script>
</body>
</html>
