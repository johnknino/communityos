<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Environmental Justice Dashboard — CommUnity OS</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#12201E">
<meta name="description" content="Environmental burden assessment by zip code. EPA ECHO facilities, violations, CDC health data, and FEMA risk index for environmental justice organizations.">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300..800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
<div class="page">
  <div class="ds-hero">
    <h1>Environmental Justice Dashboard</h1>
    <p>For environmental orgs, state EPAs, urban planners. Pollution burden and health impact by zip code.</p>
    <div class="ds-search">
      <input type="text" class="ds-zip" id="dsZip" maxlength="5" inputmode="numeric" placeholder="ZIP" onkeydown="if(event.key==='Enter')runDashboard()">
      <button class="ds-go" onclick="runDashboard()">Generate Brief</button>
    </div>
  </div>
  <div id="dsLoading" class="ds-loading" style="display:none">Querying federal data sources...</div>
  <div id="dsResults" style="display:none"></div>
</div>
<script src="/js/shared.js"></script>
<script src="/js/civic-intelligence.js"></script>
<script src="/js/dashboard-engine.js"></script>
<script>
var DE = DashEngine;

var CENSUS_VARS = ['B01003_001E','B19013_001E','B17001_002E','B17001_001E','B11001_001E','B03003_003E','B25064_001E','B25034_008E','B25034_009E','B25034_010E','B25034_011E','B25034_001E'];
var PLACES_MEASURES = ['CASTHMA','CANCER','MHLTH','LPA'];

function runDashboard() {
  var zip = document.getElementById('dsZip').value.trim();
  if (!zip || zip.length !== 5) { alert('Enter a 5-digit zip code.'); return; }
  document.getElementById('dsLoading').style.display = '';
  document.getElementById('dsResults').style.display = 'none';
  Promise.allSettled([
    DE.queryCensus(zip, CENSUS_VARS),
    DE.queryPLACES(zip, PLACES_MEASURES),
    DE.queryGeo(zip),
    DE.queryECHO(zip)
  ]).then(function(r) {
    var census=r[0].value||{},places=r[1].value||{},geo=r[2].value||{},echo=r[3].value||{};
    document.getElementById('dsLoading').style.display='none';
    render(zip,census,places,geo,echo);
  });
}

function render(zip,c,places,geo,echo) {
  var h = DE.renderProfile(zip,c,geo);
  var signals=[];
  function pv(id){return places[id]?places[id].value:0}
  var pre1978=(c.B25034_008E||0)+(c.B25034_009E||0)+(c.B25034_010E||0)+(c.B25034_011E||0);
  var housTot=c.B25034_001E||0;
  var oldPct=DE.pct(pre1978,housTot);
  var povRate=DE.pct(c.B17001_002E||0,c.B17001_001E||0);

  h += DE.sectionOpen('🏭','Environmental Burden');
  h += '<div class="ds-grid">';
  h += DE.statCard(echo.total,'EPA Facilities',echo.total>5?'highlight':'');
  h += DE.statCard(echo.violators,'Active Violations',echo.violators>0?'highlight':'good');
  h += DE.statCard(pv('CASTHMA').toFixed(1)+'%','Asthma Rate',pv('CASTHMA')>10?'highlight':'');
  h += DE.statCard(pv('CANCER').toFixed(1)+'%','Cancer Prevalence');
  h += DE.statCard(oldPct+'%','Pre-1978 Housing',oldPct>50?'highlight':'');
  h += DE.statCard(povRate+'%','Poverty Rate',povRate>20?'highlight':'');
  h += '</div>';

  if (echo.violators>0){signals.push({w:3});h+=DE.signalRow('🔴',echo.violators+' facilities with active EPA violations out of '+echo.total+' regulated facilities')}
  if (pv('CASTHMA')>10){signals.push({w:2});h+=DE.signalRow('🔴','Asthma rate '+pv('CASTHMA').toFixed(1)+'% — check proximity to industrial sources')}
  if (oldPct>60){signals.push({w:2});h+=DE.signalRow('🔴',oldPct+'% pre-1978 housing — lead exposure risk')}
  if (povRate>20&&echo.total>3){signals.push({w:2});h+=DE.signalRow('🔴','High poverty ('+povRate+'%) + industrial exposure = environmental injustice pattern')}
  if (echo.facilities && echo.facilities.length>0) {
    h += '<div style="margin-top:8px;font-size:.72rem;color:var(--dim)">';
    echo.facilities.slice(0,5).forEach(function(f){
      h+='<div style="padding:4px 0;border-bottom:1px solid var(--sand)">'+(f.FacName||'Unknown')+' — '+(f.CurrVioFlag==='Y'?'<span style="color:var(--coral);font-weight:700">VIOLATION</span>':'Compliant')+'</div>';
    });
    if (echo.total>5) h+='<div style="padding:4px 0;font-style:italic">+'+(echo.total-5)+' more facilities</div>';
    h += '</div>';
  }
  h += DE.sectionClose();

  var need=DE.calcNeedScore(signals);
  h += DE.briefOpen('Environmental Justice Brief');
  h += '<p><strong>Burden level: '+need.level+'.</strong></p>';
  if (echo.violators>0) h+='<p>🏭 <strong>Enforcement priority:</strong> '+echo.violators+' facilities in violation. File EPA complaints, request public hearing, contact state EPA.</p>';
  if (pv('CASTHMA')>10&&echo.total>3) h+='<p>🫁 <strong>Health-environment link:</strong> Asthma at '+pv('CASTHMA').toFixed(1)+'% with '+echo.total+' industrial sources. Air monitoring warranted.</p>';
  if (oldPct>50) h+='<p>🏠 <strong>Lead remediation:</strong> '+oldPct+'% pre-1978 housing. Priority for lead abatement funding.</p>';
  h+='<p>🌳 <strong>Green infrastructure:</strong> Tree planting, permeable surfaces, and urban gardens offset heat island and improve air quality.</p>';
  h += DE.briefClose();

  h += DE.actionLinks([
    {href:'/environment.html',label:'EPA facility lookup →',primary:true},
    {href:'/neighborhood.html?zip='+zip,label:'Full neighborhood profile →'},
    {href:'/311.html',label:'311 tracker →'}
  ]);
  h += (typeof CivicIntel!=='undefined' ? CivicIntel.deidentNotice() : '') + DE.sourceNote('Sources: EPA ECHO, CDC PLACES 2023, Census ACS 2022. Zero data collected.');
  document.getElementById('dsResults').innerHTML=h;
  document.getElementById('dsResults').style.display='';
  document.getElementById('dsResults').scrollIntoView({behavior:'smooth',block:'start'});
}

DE.autoLoad('dsZip', runDashboard);
EQ.init({});
</script>
</body>
</html>
