<style>
.gov-hero{text-align:center;padding:30px 16px 20px}

function zipToState(zip) { return ZIP_STATE[zip.substring(0,3)]||''; }

function findReps(){
  var addr=document.getElementById('govAddr').value.trim();
  if(!addr){alert('Enter a zip code or address.');return}
  document.getElementById('govLoading').style.display='';
  document.getElementById('govResults').style.display='none';
  fedReady.then(function(){return stateReady}).then(function(){
    var isZip=/^\d{5}$/.test(addr);
    var state='';
    if(isZip){
      state=zipToState(addr);
    } else {
      var m=addr.toUpperCase().match(/\b(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY|DC)\b/);
      if(m) state=m[1];
    }
    document.getElementById('govLoading').style.display='none';
    renderResults(state,null,addr);
  });
}

function renderResults(state,district,location){
  var es=EQ&&EQ.lang==='es';
  var h='';
  h+='<div class="gov-tabs">';
  h+='<div class="gov-tab active" onclick="showLvl(\'federal\',this)">🏛️ Federal</div>';
  h+='<div class="gov-tab" onclick="showLvl(\'state\',this)">🏢 State</div>';
  h+='<div class="gov-tab" onclick="showLvl(\'local\',this)">🏘️ Local</div>';
  h+='<div class="gov-tab" onclick="showLvl(\'promises\',this)">📋 Promises</div>';
  h+='</div>';

  // FEDERAL
  h+='<div class="gov-level" id="lvl-federal">';
  if(fedData&&state&&fedData.by_state[state]){
    var st=fedData.by_state[state];
    var count=(st.senators||[]).length+(st.representatives||[]).length;
    h+='<h3>🏛️ '+(es?'Representantes Federales — '+state:'Federal Representatives — '+state)+'</h3>';
    (st.senators||[]).forEach(function(s){h+=card(s,'U.S. Senator')});
    if(district){
      var rep=(st.representatives||[]).find(function(r){return r.district==district});
      if(rep)h+=card(rep,'U.S. Representative — District '+district);
    } else {
      if((st.representatives||[]).length>3){
        h+='<p style="font-size:.72rem;color:var(--dim);margin:6px 0;font-style:italic">'+(es?'Ingresa tu dirección completa para ver solo tu distrito.':'Enter your full address to see only your district.')+'</p>';
      }
      (st.representatives||[]).forEach(function(r){h+=card(r,'U.S. Rep — District '+r.district)});
    }
  } else {
    h+='<div class="gov-empty">'+(es?'Ingresa tu código postal para ver tus representantes.':'Enter your zip code to see your representatives.')+'</div>';
  }
  h+='</div>';

  // STATE
  h+='<div class="gov-level" id="lvl-state" style="display:none">';
  if(stateData&&state){
    var stOfficials=stateData.filter(function(o){return o.s===state});
    var execs=stOfficials.filter(function(o){return o.ex===1});
    var senators=stOfficials.filter(function(o){return o.t==='State Senator'});
    var reps=stOfficials.filter(function(o){return o.t==='State Representative'||o.t==='State Legislator'});
    h+='<h3>🏢 '+(es?'Funcionarios Estatales — '+state:'State Officials — '+state)+' ('+stOfficials.length+')</h3>';
    if(execs.length>0){
      h+='<p style="font-family:var(--display);font-size:.78rem;font-weight:700;color:var(--deep);margin:12px 0 6px">'+(es?'Ejecutivo':'Executive')+'</p>';
      execs.forEach(function(o){h+=stateCard(o)});
    }
    if(senators.length>0){
      h+='<p style="font-family:var(--display);font-size:.78rem;font-weight:700;color:var(--deep);margin:12px 0 6px">'+(es?'Senado Estatal':'State Senate')+' ('+senators.length+')</p>';
      senators.forEach(function(o){h+=stateCard(o)});
    }
    if(reps.length>0){
      h+='<p style="font-family:var(--display);font-size:.78rem;font-weight:700;color:var(--deep);margin:12px 0 6px">'+(es?'Cámara de Representantes':'State House')+' ('+reps.length+')</p>';
      reps.forEach(function(o){h+=stateCard(o)});
    }
  } else {
    h+='<div class="gov-empty">'+(es?'Ingresa tu código postal para ver tus legisladores estatales.':'Enter your zip code to see your state legislators.')+'</div>';
  }
  h+='</div>';

  // LOCAL
  h+='<div class="gov-level" id="lvl-local" style="display:none">';
  h+='<h3>🏘️ '+(es?'Funcionarios Locales':'Local Officials')+'</h3>';
  h+='<div class="gov-empty">';
  h+='<p style="font-weight:600;font-size:.9rem;color:var(--deep)">'+(es?'Este es el eslabón perdido.':'This is the missing link.')+'</p>';
  h+='<p>'+(es?'No existe ninguna base de datos nacional gratuita de funcionarios locales. Tu concejal, tu junta escolar, tu comisionado de parque — nadie rastrea estos datos de forma gratuita. Tu comunidad los agrega aquí.':'No free national database of local officials exists. Your city council member, your school board trustee, your park commissioner — no one tracks this data for free. Your community adds them here.')+'</p>';
  h+='</div>';
  h+='<div class="gov-add"><button onclick="addLocal()">'+(es?'+ Agregar Funcionario Local':'+ Add Local Official')+'</button></div>';
  h+='</div>';

  // PROMISES
  h+='<div class="gov-level" id="lvl-promises" style="display:none">';
  h+='<h3>📋 '+(es?'Rastreador de Promesas':'Promise Tracker')+'</h3>';
  h+='<div class="gov-empty">';
  h+='<p>'+(es?'¿Qué prometió tu funcionario? ¿Cumplió? La comunidad rastrea y califica.':'What did your official promise? Did they deliver? The community tracks and rates.')+'</p>';
  h+='<p style="font-size:.68rem;color:var(--dim);margin-top:6px">'+(es?'Calificaciones: Lograda · En Progreso · Estancada · No Iniciada · Rota':'Ratings: Achieved · In Progress · Stalled · Not Started · Broken')+'</p>';
  h+='</div>';
  h+='<div class="gov-add"><button onclick="addPromise()">'+(es?'+ Registrar una Promesa':'+ Record a Promise')+'</button></div>';
  h+='</div>';

  h+='<p class="gov-note">'+(es?'Datos federales: unitedstates/congress-legislators (538 funcionarios). Datos estatales: Open States/Plural (7,500+ legisladores, CC0). Datos locales: mantenidos por la comunidad. Sin APIs externas — sin dependencia de terceros.':'Federal data: unitedstates/congress-legislators (538 officials). State data: Open States/Plural (7,500+ legislators, CC0 public domain). Local data: community-maintained. No external APIs — no third-party dependency.')+'</p>';

  document.getElementById('govResults').innerHTML=h;
  document.getElementById('govResults').style.display='';
  document.getElementById('govResults').scrollIntoView({behavior:'smooth',block:'start'});
}

function card(o,role){
  var init=(o.name||'').split(' ').map(function(w){return w[0]}).join('').substring(0,2);
  var pc=o.party==='Democrat'?'dem':o.party==='Republican'?'rep':'ind';
  var ps=o.party==='Democrat'?'D':o.party==='Republican'?'R':'I';
  var h='<div class="gov-card"><div class="gc-top">';
  h+='<div class="gc-avatar">'+init+'</div><div>';
  h+='<div class="gc-name">'+o.name+'</div>';
  h+='<div class="gc-role">'+role+'</div>';
  h+='<span class="gc-party '+pc+'">'+ps+' — '+o.party+'</span>';
  h+='</div></div><div class="gc-contact">';
  if(o.phone)h+='<a href="tel:'+o.phone+'" class="gc-link">📞 '+o.phone+'</a>';
  if(o.url)h+='<a href="'+o.url+'" target="_blank" rel="noopener" class="gc-link">🌐 Website</a>';
  if(o.contact)h+='<a href="'+o.contact+'" target="_blank" rel="noopener" class="gc-link">✉️ Contact</a>';
  h+='<a href="https://www.congress.gov/search?q={%22source%22:%22members%22,%22search%22:%22'+encodeURIComponent(o.name)+'%22}" target="_blank" rel="noopener" class="gc-link">📜 Votes</a>';
  h+='</div></div>';
  return h;
}

function stateCard(o){
  var init=(o.n||'').split(' ').map(function(w){return w[0]}).join('').substring(0,2);
  var partyFull=o.p==='Democratic'?'Democrat':o.p||'';
  var pc=o.p==='Democratic'?'dem':o.p==='Republican'?'rep':'ind';
  var ps=o.p==='Democratic'?'D':o.p==='Republican'?'R':'I';
  var role=o.t+(o.d&&o.d!=='statewide'?' — District '+o.d:'');
  var h='<div class="gov-card"><div class="gc-top">';
  h+='<div class="gc-avatar">'+init+'</div><div>';
  h+='<div class="gc-name">'+o.n+'</div>';
  h+='<div class="gc-role">'+role+'</div>';
  h+='<span class="gc-party '+pc+'">'+ps+' — '+partyFull+'</span>';
  h+='</div></div><div class="gc-contact">';
  if(o.ph)h+='<a href="tel:'+o.ph+'" class="gc-link">📞 '+o.ph+'</a>';
  if(o.e)h+='<a href="mailto:'+o.e+'" class="gc-link">✉️ Email</a>';
  if(o.url)h+='<a href="'+o.url+'" target="_blank" rel="noopener" class="gc-link">🌐 Website</a>';
  if(o.a)h+='<span class="gc-link" style="cursor:default;opacity:.8">📍 '+o.a.split(',')[0]+'</span>';
  h+='</div></div>';
  return h;
}

function showLvl(id,btn){
  document.querySelectorAll('.gov-level').forEach(function(el){el.style.display='none'});
  document.querySelectorAll('.gov-tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('lvl-'+id).style.display='';
  if(btn)btn.classList.add('active');
}

function addLocal(){ CivicTokens.requireToken('add_official', function(tokenResult) {
  if(typeof CommunityAPI!=='undefined'&&CommunityAPI.isConfigured()){
    var n=prompt("Official's name:");if(!n)return;
    var r=prompt("Role (e.g., Alderman Ward 12):");if(!r)return;
    var p=prompt("Phone (optional):")||'';
    CommunityAPI.smartFetch(CommunityAPI.endpoint(),{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'add_promise',type:'official',official:n,promise:r,source:p,zip:document.getElementById('govAddr').value.trim()})}).then(function(){alert('Added!')}).catch(function(){alert('Backend unavailable.')});
  } else { alert('Community features need a backend. See /how-it-works.html'); }
  });
}

function addPromise(){ CivicTokens.requireToken('promise', function(tokenResult) {
  if(typeof CommunityAPI!=='undefined'&&CommunityAPI.isConfigured()){
    var o=prompt("Who made the promise?");if(!o)return;
    var pr=prompt("What did they promise?");if(!pr)return;
    var s=prompt("Source (URL, date, event):")||'';
    CommunityAPI.smartFetch(CommunityAPI.endpoint(),{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'add_promise',official:o,promise:pr,source:s,zip:document.getElementById('govAddr').value.trim()})}).then(function(){alert('Promise recorded!')}).catch(function(){alert('Backend unavailable.')});
  } else { alert('Promise tracking needs a backend. See /how-it-works.html'); }
  });
}
