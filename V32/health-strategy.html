<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Health Strategy Dashboard — CommUnity OS</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#12201E">
<meta name="description" content="Community health needs assessment by zip code. CDC PLACES + Census + NPPES provider data for hospitals, FQHCs, and health departments.">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300..800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
</head>
<body>
<div class="page">
  <div class="ds-hero">
    <h1>Health Strategy Dashboard</h1>
    <p>For hospitals, FQHCs, health departments, insurance outreach. Community health profile in seconds.</p>
    <div class="ds-search">
      <input type="text" class="ds-zip" id="dsZip" maxlength="5" inputmode="numeric" placeholder="ZIP" onkeydown="if(event.key==='Enter')runDashboard()">
      <button class="ds-go" onclick="runDashboard()">Generate Brief</button>
    </div>
  </div>
  <div id="dsLoading" class="ds-loading" style="display:none">Querying federal data sources...</div>
  <div id="dsResults" style="display:none"></div>
</div>
<script src="/js/shared.js"></script>
<script src="/js/civic-intelligence.js"></script>
<script src="/js/dashboard-engine.js"></script>
<script>
var DE = DashEngine;

var CENSUS_VARS = ['B01003_001E','B19013_001E','B17001_002E','B17001_001E','B11001_001E','B03003_003E','B25064_001E','B27010_017E','B27010_033E','B27010_050E','B27010_001E','B25034_008E','B25034_009E','B25034_010E','B25034_011E','B25034_001E','B18101_004E','B18101_001E','B01001_020E','B01001_021E','B01001_022E','B01001_023E','B01001_024E','B01001_025E','B01001_044E','B01001_045E','B01001_046E','B01001_047E','B01001_048E','B01001_049E'];
var PLACES_MEASURES = ['DIABETES','OBESITY','BPHIGH','MHLTH','ACCESS2','CASTHMA','DEPRESSION','CSMOKING','MAMMOUSE','DENTAL','LPA'];

function runDashboard() {
  var zip = document.getElementById('dsZip').value.trim();
  if (!zip || zip.length !== 5) { alert('Enter a 5-digit zip code.'); return; }
  document.getElementById('dsLoading').style.display = '';
  document.getElementById('dsResults').style.display = 'none';
  Promise.allSettled([
    DE.queryCensus(zip, CENSUS_VARS),
    DE.queryPLACES(zip, PLACES_MEASURES),
    DE.queryGeo(zip),
    DE.queryProviders(zip)
  ]).then(function(r) {
    var census=r[0].value||{}, places=r[1].value||{}, geo=r[2].value||{}, providers=r[3].value||{};
    document.getElementById('dsLoading').style.display = 'none';
    render(zip, census, places, geo, providers);
  });
}

function render(zip, c, places, geo, providers) {
  var h = DE.renderProfile(zip, c, geo);
  var signals = [];
  var pop=c.B01003_001E||0;
  var uninsured=(c.B27010_017E||0)+(c.B27010_033E||0)+(c.B27010_050E||0);
  var insTot=c.B27010_001E||0;
  var uninsuredPct=DE.pct(uninsured,insTot);
  var pre1978=(c.B25034_008E||0)+(c.B25034_009E||0)+(c.B25034_010E||0)+(c.B25034_011E||0);
  var housingTot=c.B25034_001E||0;
  var leadRisk=DE.pct(pre1978,housingTot);
  var senior=(c.B01001_020E||0)+(c.B01001_021E||0)+(c.B01001_022E||0)+(c.B01001_023E||0)+(c.B01001_024E||0)+(c.B01001_025E||0)+(c.B01001_044E||0)+(c.B01001_045E||0)+(c.B01001_046E||0)+(c.B01001_047E||0)+(c.B01001_048E||0)+(c.B01001_049E||0);
  var seniorPct=DE.pct(senior,pop);

  function pv(id){return places[id]?places[id].value:0}

  h += DE.sectionOpen('🏥','Health Indicators (CDC PLACES)');
  h += '<div class="ds-grid">';
  h += DE.statCard(uninsuredPct+'%','Uninsured',uninsuredPct>15?'highlight':uninsuredPct<8?'good':'');
  h += DE.statCard(pv('DIABETES').toFixed(1)+'%','Diabetes',pv('DIABETES')>12?'highlight':'');
  h += DE.statCard(pv('OBESITY').toFixed(1)+'%','Obesity',pv('OBESITY')>35?'highlight':'');
  h += DE.statCard(pv('BPHIGH').toFixed(1)+'%','Hypertension',pv('BPHIGH')>35?'highlight':'');
  h += DE.statCard(pv('MHLTH').toFixed(1)+'%','Mental Distress',pv('MHLTH')>16?'highlight':'');
  h += DE.statCard(pv('CASTHMA').toFixed(1)+'%','Asthma',pv('CASTHMA')>10?'highlight':'');
  h += DE.statCard(pv('DEPRESSION').toFixed(1)+'%','Depression');
  h += DE.statCard(pv('CSMOKING').toFixed(1)+'%','Smoking');
  h += DE.statCard(pv('LPA').toFixed(1)+'%','Physical Inactivity',pv('LPA')>30?'highlight':'');
  h += DE.statCard(pv('DENTAL').toFixed(1)+'%','No Dental Visit');
  h += DE.statCard(leadRisk+'%','Pre-1978 Housing',leadRisk>50?'highlight':'');
  h += DE.statCard(providers.count||0,'Providers in ZIP');
  h += '</div>';
  h += DE.sectionClose();

  // Signals
  h += DE.sectionOpen('⚠️','Risk Signals');
  if (uninsuredPct>15){signals.push({w:3});h+=DE.signalRow('🔴',uninsuredPct+'% uninsured — '+DE.fmt(uninsured)+' people without coverage')}
  if (pv('DIABETES')>12){signals.push({w:2});h+=DE.signalRow('🔴','Diabetes at '+pv('DIABETES').toFixed(1)+'% — diabetes prevention and management programs critical')}
  if (pv('MHLTH')>16){signals.push({w:2});h+=DE.signalRow('🔴','Mental distress at '+pv('MHLTH').toFixed(1)+'% — behavioral health integration needed')}
  if (pv('CASTHMA')>10){signals.push({w:1});h+=DE.signalRow('🟡','Asthma at '+pv('CASTHMA').toFixed(1)+'% — check EPA violations nearby')}
  if (leadRisk>50){signals.push({w:2});h+=DE.signalRow('🔴',leadRisk+'% pre-1978 housing — childhood lead screening priority')}
  if (seniorPct>20){signals.push({w:1});h+=DE.signalRow('🟡',seniorPct+'% age 65+ — chronic disease management, fall prevention, Medicare optimization')}
  if (pv('MAMMOUSE')<70) h+=DE.signalRow('🟡','Mammography screening below 70% — mobile screening van opportunity');
  if (providers.count<20) h+=DE.signalRow('🟡','Low provider count ('+providers.count+') — possible health professional shortage area');
  h += DE.sectionClose();

  var need = DE.calcNeedScore(signals);
  h += DE.briefOpen('CHNA Deployment Brief');
  h += '<p><strong>Need level: '+need.level+'.</strong></p>';
  if (uninsuredPct>15) h+='<p>🏥 <strong>Coverage gap:</strong> '+DE.fmt(uninsured)+' uninsured. Marketplace enrollment events and Medicaid outreach needed.</p>';
  if (pv('DIABETES')>12) h+='<p>💊 <strong>Diabetes prevention:</strong> DPP referral pipeline from FQHC to community-based program.</p>';
  if (leadRisk>50) h+='<p>🏠 <strong>Lead risk:</strong> '+leadRisk+'% pre-1978 housing. Blood lead level screening for all children under 6.</p>';
  h += '<p>📱 <strong>Digital access:</strong> CommUnity OS health calculators (ASCVD, diabetes risk, BMI) can run on waiting room tablets. Zero data stored.</p>';
  h += DE.briefClose();

  h += DE.actionLinks([
    {href:'/neighborhood.html?zip='+zip,label:'Full neighborhood profile →',primary:true},
    {href:'/health-calc.html',label:'Health calculators →'},
    {href:'/drug-prices.html',label:'Drug price check →'}
  ]);
  h += (typeof CivicIntel!=='undefined' ? CivicIntel.deidentNotice() : '') + DE.sourceNote('Sources: Census ACS 2022, CDC PLACES 2023 (40 health measures), NPPES NPI Registry. Zero data collected.');
  document.getElementById('dsResults').innerHTML = h;
  document.getElementById('dsResults').style.display = '';
  document.getElementById('dsResults').scrollIntoView({behavior:'smooth',block:'start'});
}

DE.autoLoad('dsZip', runDashboard);
EQ.init({});
</script>
</body>
</html>
